<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CleanOS - UI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        .iphone-frame { width: 375px; height: 812px; border: 12px solid #333; border-radius: 50px; background: #000; overflow: hidden; position: relative; box-shadow: 0 0 50px rgba(255,255,255,0.1); }
        .gradient-text { background: linear-gradient(90deg, #4facfe 0%, #00f2fe 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .card-glass { background: rgba(255, 255, 255, 0.08); backdrop-filter: blur(10px); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.1); transition: transform 0.2s; }
        .card-glass:active { transform: scale(0.97); }
        .progress-circle { transform: rotate(-90deg); }
        .tab-active { color: #4facfe; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen">
    <div class="iphone-frame flex flex-col">
        <!-- Status Bar -->
        <div class="px-8 pt-4 flex justify-between items-center text-xs font-semibold">
            <span>9:41</span>
            <div class="space-x-1 flex items-center">
                <i class="fas fa-signal"></i>
                <i class="fas fa-wifi mx-1"></i>
                <i class="fas fa-battery-full text-lg"></i>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-grow px-6 pt-6 overflow-y-auto pb-24">
            <!-- Storage Dashboard -->
            <div class="text-center mb-8">
                <div class="relative inline-block mb-4">
                    <svg width="180" height="180" class="progress-circle">
                        <circle cx="90" cy="90" r="80" stroke="#222" stroke-width="12" fill="none" />
                        <circle cx="90" cy="90" r="80" stroke="#4facfe" stroke-width="12" fill="none" stroke-dasharray="502" stroke-dashoffset="150" stroke-linecap="round" />
                    </svg>
                    <div class="absolute inset-0 flex flex-col items-center justify-center">
                        <span class="text-4xl font-black">72%</span>
                        <span class="text-gray-500 text-xs font-bold uppercase tracking-widest">Storage</span>
                    </div>
                </div>
                <h1 class="text-2xl font-extrabold mb-1">CleanOS</h1>
                <p class="text-gray-400 text-sm">Scanning your gallery...</p>
            </div>

            <!-- Action Categories -->
            <div class="grid grid-cols-2 gap-4">
                <!-- Duplicates -->
                <div class="card-glass p-4 flex flex-col items-center justify-center space-y-2">
                    <div class="w-12 h-12 rounded-2xl bg-blue-500/20 flex items-center justify-center text-blue-400">
                        <i class="fas fa-clone text-xl"></i>
                    </div>
                    <span class="font-bold text-sm">Duplicates</span>
                    <span class="text-[10px] font-bold text-blue-400">2.4 GB</span>
                </div>

                <!-- Similar -->
                <div class="card-glass p-4 flex flex-col items-center justify-center space-y-2">
                    <div class="w-12 h-12 rounded-2xl bg-purple-500/20 flex items-center justify-center text-purple-400">
                        <i class="fas fa-images text-xl"></i>
                    </div>
                    <span class="font-bold text-sm">Similar</span>
                    <span class="text-[10px] font-bold text-purple-400">4.1 GB</span>
                </div>

                <!-- Blurry -->
                <div class="card-glass p-4 flex flex-col items-center justify-center space-y-2">
                    <div class="w-12 h-12 rounded-2xl bg-orange-500/20 flex items-center justify-center text-orange-400">
                        <i class="fas fa-low-vision text-xl"></i>
                    </div>
                    <span class="font-bold text-sm">Blurry</span>
                    <span class="text-[10px] font-bold text-orange-400">850 MB</span>
                </div>

                <!-- Screenshots -->
                <div class="card-glass p-4 flex flex-col items-center justify-center space-y-2">
                    <div class="w-12 h-12 rounded-2xl bg-green-500/20 flex items-center justify-center text-green-400">
                        <i class="fas fa-camera-retro text-xl"></i>
                    </div>
                    <span class="font-bold text-sm">Screenshots</span>
                    <span class="text-[10px] font-bold text-green-400">1.2 GB</span>
                </div>
            </div>

            <!-- Email Cleanup Row -->
            <div class="card-glass p-5 mt-4 flex items-center justify-between">
                <div class="flex items-center space-x-4">
                    <div class="w-12 h-12 rounded-2xl bg-red-500/20 flex items-center justify-center text-red-400">
                        <i class="fas fa-envelope-open-text text-xl"></i>
                    </div>
                    <div>
                        <h3 class="font-bold">Email Cleanup</h3>
                        <p class="text-[10px] text-gray-400 font-medium">Remove junk & attachments</p>
                    </div>
                </div>
                <div class="text-right">
                    <span class="block font-bold text-red-400 text-sm">3.5 GB</span>
                    <i class="fas fa-chevron-right text-gray-600 text-xs"></i>
                </div>
            </div>
        </div>

        <!-- Tab Bar -->
        <div class="absolute bottom-0 w-full px-8 pb-8 pt-4 flex justify-between items-center backdrop-blur-md bg-black/50 border-t border-white/5">
            <div class="flex flex-col items-center tab-active">
                <i class="fas fa-house text-xl"></i>
                <span class="text-[8px] mt-1 font-bold uppercase">Home</span>
            </div>
            <div class="flex flex-col items-center text-gray-600">
                <i class="fas fa-bolt text-xl"></i>
                <span class="text-[8px] mt-1 font-bold uppercase">Smart</span>
            </div>
            <div class="flex flex-col items-center text-gray-600">
                <i class="fas fa-chart-pie text-xl"></i>
                <span class="text-[8px] mt-1 font-bold uppercase">Space</span>
            </div>
            <div class="flex flex-col items-center text-gray-600">
                <i class="fas fa-gear text-xl"></i>
                <span class="text-[8px] mt-1 font-bold uppercase">Settings</span>
            </div>
        </div>
    </div>
</body>
</html>
